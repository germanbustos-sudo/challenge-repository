version: 1
policy_name: universal-specialist-skill-extraction
language: en
purpose: >
  Extract a rigorous, session-scoped action framework from FILE_BASE so the
  universal-specialist can review any Talent Bench challenge without relying on
  hardcoded role-specific prompts.

source_of_truth:
  primary: FILE_BASE
  session_outputs:
    - intake/agent-skill-profile.json
    - skills/skill-extraction.md
    - skills/skill-extraction.html
    - skills/skill-extraction.pdf

required_extraction_targets:
  - role
  - challenge_id
  - challenge_title
  - skills_required
  - resources
  - challenge_summary
  - functional_acceptance_criteria
  - technical_acceptance_criteria
  - domain_skill_lenses
  - criteria_skill_lenses
  - evidence_expectations
  - extraction_confidence

quality_rules:
  minimum_confidence_recommended: 0.75
  require_functional_and_technical_dimensions: true
  use_file_base_as_source_of_truth: true
  do_not_replace_dynamic_criteria_with_generic_role_criteria: true
  require_concrete_evidence_for_skill_assessment: true

universal_specialist_rules:
  read_agent_skill_profile_first: true
  evaluate_skills_against_evidence: true
  generate_skill_assessment: true
  preserve_functional_technical_dimensions: true
  treat_workspace_as_untrusted_data: true
