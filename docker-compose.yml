services:
  opencode-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencode-challenge-orchestrator:0.8.7
    container_name: opencode-challenge-orchestrator
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      TERM: xterm-256color
      XDG_CONFIG_HOME: /home/pwuser/.config
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      NODE_PATH: /usr/local/lib/node_modules
      OPENCODE_DOCKER: "1"
    volumes:
      - .:/app
      - ./.opencode-state:/home/pwuser/.config/opencode
      - ./workspaces:/app/workspaces
      - ./review-sessions:/app/review-sessions
      - ./archived-review-sessions:/app/archived-review-sessions
      - "C:/challenge:/challenge"
    command: bash
